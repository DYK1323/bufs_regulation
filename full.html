<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>규정 전문</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<link rel="stylesheet" href="krds_tokens.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy:      var(--krds-color-light-secondary-70);  /* #063A74 */
    --navy-l:    var(--krds-color-light-secondary-60);  /* #1C589C */
    --gold:      #FDB71A;
    --ink:       var(--krds-color-light-gray-90);       /* #1E2124 */
    --ink-soft:  var(--krds-color-light-gray-60);       /* #58616A */
    --ink-muted: var(--krds-color-light-gray-50);       /* #6D7882 */
    --paper:     var(--krds-color-light-gray-0);
    --muted:     var(--krds-color-light-gray-5);
    --card:      var(--krds-color-light-gray-0);
    --border:    var(--krds-color-light-gray-20);       /* #CDD1D5 */
    --toc-w:     320px;
  }
  html { scroll-behavior: smooth; }
  body {
    background: var(--paper); color: var(--ink);
    font-family: "Pretendard Variable", "Noto Sans KR", -apple-system, sans-serif;
    font-size: 16px; line-height: 1.8;
  }

  /* ── 헤더 ── */
  .site-header {
    position: sticky; top: 0; z-index: 200;
    background: #fff; border-bottom: 1px solid var(--navy);
    padding: 32px 40px 24px;
  }
  .site-header-inner {
    max-width: 1360px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    gap: 32px;
  }
  .site-logo {
    display: flex; align-items: center; gap: 16px;
    font-size: 1.5rem; font-weight: 700; color: #1E2124;
    text-decoration: none; white-space: nowrap; flex-shrink: 0;
  }
  .site-logo img { height: 36px; width: auto; }
  .header-actions { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .back-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; border: 1px solid var(--border); border-radius: 6px;
    font-size: 0.82rem; font-weight: 500; color: var(--ink-soft);
    background: none; cursor: pointer; font-family: inherit; transition: all 0.15s; text-decoration: none;
  }
  .back-btn:hover { background: var(--muted); color: var(--ink); }
  .pdf-btn-header {
    display: none; align-items: center; gap: 6px;
    padding: 7px 14px; border: 1px solid var(--border); border-radius: 6px;
    font-size: 0.82rem; font-weight: 500; color: var(--ink-soft);
    background: none; text-decoration: none; transition: all 0.15s;
  }
  .pdf-btn-header:hover { background: var(--muted); color: var(--ink); }
  .print-btn-header {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; border: 1px solid var(--border); border-radius: 6px;
    font-size: 0.82rem; font-weight: 500; color: var(--ink-soft);
    background: none; cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .print-btn-header:hover { background: var(--muted); color: var(--ink); }

  /* ── 레이아웃 ── */
  .toc {
    position: fixed; left: 0; top: 92px; width: var(--toc-w); height: calc(100vh - 92px);
    overflow-y: auto; background: var(--card); border-right: 1px solid var(--border);
    z-index: 100; padding: 24px 12px;
  }
  .toc::-webkit-scrollbar { width: 4px; }
  .toc::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .content-area { margin-left: var(--toc-w); min-height: 100vh; background: var(--paper); }
  .site-footer {
    margin-left: var(--toc-w);
    padding: 16px 40px;
    background: var(--krds-light-color-surface-gray-subtle);
    border-top: 1px solid var(--krds-light-color-surface-gray-subtle);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.9375rem; color: #464C53; line-height: 1.5; font-weight: 400;
    text-align: center;
  }

  /* ── TOC 스타일 ── */
  .toc-header { padding: 0 8px 16px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
  .toc-reg-name { font-size: 0.95rem; font-weight: 700; color: var(--ink); line-height: 1.4; }

  .toc-chap-row, .toc-sect-row {
    display: flex; align-items: flex-start; gap: 6px; padding: 6px 8px;
    border-radius: 6px; cursor: pointer; transition: background 0.1s;
  }
  .toc-chap-row:hover, .toc-sect-row:hover { background: var(--muted); }
  .toc-chap-row { margin-top: 6px; }
  .toc-sect-row { margin-left: 12px; }
  .toc-toggle {
    flex-shrink: 0; font-size: 10px; color: var(--ink-muted);
    width: 16px; height: 16px; display: flex; align-items: center; justify-content: center;
    margin-top: 4px; cursor: pointer;
  }
  .toc-chap-label { font-size: 0.875rem; font-weight: 700; color: var(--ink); text-decoration: none; }
  .toc-sect-label { font-size: 0.82rem; font-weight: 600; color: var(--ink-soft); text-decoration: none; }
  .toc-chap-body.collapsed, .toc-sect-body.collapsed { display: none; }
  .toc-art {
    display: block; padding: 3px 12px 3px 16px; margin: 2px 0 2px 28px;
    font-size: 0.8rem; color: var(--ink-muted); font-weight: 400;
    text-decoration: none; border-left: 1px solid var(--border);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: all 0.1s;
  }
  .toc-sect-body .toc-art { margin-left: 40px; }
  .toc-art:hover { color: var(--navy); border-left-color: var(--gold); background: #fffbf0; }
  .toc-art.active { color: var(--navy); font-weight: 600; border-left: 2px solid var(--gold); background: #fffbf0; }

  /* ── 본문 ── */
  .page-wrap { max-width: 800px; margin: 0 auto; padding: 48px 40px 120px; }

  /* 규정 타이틀 블록 */
  .reg-title-block { text-align: center; margin-bottom: 32px; padding-bottom: 24px; border-bottom: 2px solid var(--border); }
  .reg-category-badge {
    display: inline-block; padding: 3px 12px; border-radius: 4px;
    background: rgba(13,74,122,0.08); color: var(--navy);
    font-size: 0.82rem; font-weight: 500; margin-bottom: 10px;
  }
  .reg-title { font-size: 1.875rem; font-weight: 700; color: var(--ink); margin-bottom: 16px; font-family: "Noto Sans KR", sans-serif; }
  .reg-meta-row { display: flex; align-items: flex-start; justify-content: space-between; }
  .reg-meta { font-size: 0.85rem; color: var(--ink-muted); line-height: 1.8; text-align: left; }

  /* 장/절/조 */
  .chapter-header {
    font-size: 1.25rem; font-weight: 700; color: var(--ink); text-align: center;
    margin: 48px 0 20px; padding: 12px 0; border-bottom: 1px solid var(--navy);
    scroll-margin-top: 80px;
  }
  .section-header {
    font-size: 1rem; font-weight: 700; color: var(--ink-soft); text-align: center;
    margin: 28px 0 14px; padding-left: 16px; border-left: 4px solid rgba(13,74,122,0.4);
    text-align: left; scroll-margin-top: 80px;
  }
  .article { margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid var(--border); scroll-margin-top: 80px; }
  .article-title { font-weight: 700; font-size: 1rem; color: var(--ink); margin-bottom: 8px; }
  .article-body { font-size: 1rem; color: #374151; }

  .para-line { display: block; padding-left: 1.2em; text-indent: -1.2em; margin-bottom: 4px; }
  .item-line { display: block; padding-left: 2.4em; text-indent: -1.2em; margin-bottom: 2px; }
  .subitem-line { display: block; padding-left: 3.6em; text-indent: -1.2em; margin-bottom: 2px; }

  .anno-rev { font-size: 0.78rem; color: var(--ink-muted); font-style: normal !important; margin-left: 2px; }
  .anno-del { font-size: 0.78rem; color: #DC2626; font-style: normal !important; margin-left: 2px; }
  .art-revision { display: block; margin-top: 6px; font-size: 0.78rem; color: var(--ink-muted); font-style: normal !important; }

  /* 부칙 */
  .amendment-section { margin-top: 60px; padding-top: 32px; border-top: 2px solid var(--border); }
  .amendment-section-title { font-size: 0.75rem; font-weight: 700; color: var(--ink-muted); letter-spacing: 0.15em; margin-bottom: 24px; text-transform: uppercase; text-align: center; }
  .amendment-item { border: 1px solid var(--border); border-radius: 8px; padding: 20px 24px; margin-bottom: 12px; }
  .amendment-header { font-weight: 700; font-size: 0.95rem; color: var(--ink); margin-bottom: 8px; text-align: center; }
  .amendment-content { font-size: 0.9rem; color: var(--ink-soft); white-space: pre-wrap; }

  /* 스켈레톤 */
  .skeleton-line {
    height: 14px; border-radius: 4px; margin: 12px 0;
    background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
    background-size: 200% 100%; animation: skeleton-loading 1.5s infinite;
  }
  .skeleton-block {
    height: 120px; border-radius: 8px; margin-bottom: 24px;
    background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
    background-size: 200% 100%; animation: skeleton-loading 1.5s infinite;
  }
  @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* 본문 표 */
  .article-body table { border-collapse: collapse; width: 100%; margin: 14px 0; font-size: 0.9rem; }
  .article-body th, .article-body td { border: 1px solid #e5e7eb; padding: 4px 8px; text-align: center; line-height: 1.4; }
  .article-body th { background: #f8fafc; font-weight: 700; color: #374151; }
  .article-body tr:nth-child(even) { background: #fafafa; }

  /* 인쇄 */
  .print-btn, .pdf-btn { display: none; }
  @media print {
    .site-header, .toc, .print-btn, .pdf-btn { display: none !important; }
    .content-area { margin-left: 0; }
    .page-wrap { padding: 0; }
  }
</style>
</head>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx5Sqkb3yN1yPqmjSLv_9JIFUuyEvEqVA0Lw6s4OlLwUwtmRj1zMz7NXAautTuzngbg/exec";
// 기존 데이터 처리 함수들 유지
function escHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function buildArticleNo(raw) {
  if (!raw) return "";
  const s = String(raw).trim();
  if (s.includes("_")) { const p = s.split("_"); return "제" + p[0] + "조의" + p[1]; }
  return "제" + s + "조";
}
function allowHtml(s){
  if(!s) return "";
  return String(s)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/&lt;(\/?(table|tr|td|th|tbody|thead)[^&]*)&gt;/gi,"<$1>");
}
function buildChapterNo(s) { if (!s) return ""; return "제" + s + (s.includes("의") ? "" : "장"); }
function buildSectionNo(s) { if (!s) return ""; return "제" + s + (s.includes("의") ? "" : "절"); }
const CIRCLED = ["","①","②","③","④","⑤","⑥","⑦","⑧","⑨","⑩","⑪","⑫","⑬","⑭","⑮","⑯","⑰","⑱","⑲","⑳"];
function circle(n) { return CIRCLED[parseInt(n)] || String(n); }

function tocToggle(arrowEl) {
  const row = arrowEl.parentElement;
  const body = row.nextElementSibling;
  if (!body) return;
  const collapsed = body.classList.toggle("collapsed");
  arrowEl.textContent = collapsed ? "▸" : "▾";
}

function artAnchorId(articleNo) { return "art-" + String(articleNo).replace(/[^a-zA-Z0-9_\-]/g, "_"); }
function chapAnchorId(chapter) { return "chap-" + String(chapter).replace(/[^a-zA-Z0-9_\-]/g, "_"); }
function sectAnchorId(section) { return "sect-" + String(section).replace(/[^a-zA-Z0-9_\-]/g, "_"); }

// 트리 구조 생성 로직 (기존 buildToc 유지)
function buildToc(regulationName, articleOrder, articleMap) {
  const groups = [];
  let curChapIdx = -1;
  let curSectIdx = -1;

  articleOrder.forEach(key => {
    const art = articleMap[key];
    const chapKey = art.chapter || "";
    if (chapKey) {
      if (curChapIdx < 0 || groups[curChapIdx].chapter !== chapKey) {
        groups.push({ chapter: chapKey, chapterTitle: art.chapterTitle || "", sections: [], articles: [] });
        curChapIdx = groups.length - 1; curSectIdx = -1;
      }
      const chap = groups[curChapIdx];
      const sectKey = art.section || "";
      if (sectKey) {
        if (curSectIdx < 0 || chap.sections[curSectIdx].section !== sectKey) {
          chap.sections.push({ section: sectKey, sectionTitle: art.sectionTitle || "", articles: [] });
          curSectIdx = chap.sections.length - 1;
        }
        chap.sections[curSectIdx].articles.push(art);
      } else { chap.articles.push(art); }
    } else {
      if (curChapIdx < 0 || groups[curChapIdx].chapter !== "") {
        groups.push({ chapter: "", chapterTitle: "", sections: [], articles: [] });
        curChapIdx = groups.length - 1; curSectIdx = -1;
      }
      groups[curChapIdx].articles.push(art);
    }
  });

  let h = '<div class="toc-header"><div class="toc-reg-name">' + escHtml(regulationName) + '</div></div>';
  groups.forEach(chap => {
    if (chap.chapter) {
      const chapLabel = buildChapterNo(chap.chapter) + (chap.chapterTitle ? " " + chap.chapterTitle : "");
      h += '<div class="toc-chap-row"><span class="toc-toggle" onclick="tocToggle(this)">▾</span>'
        + '<a class="toc-chap-label" href="#' + chapAnchorId(chap.chapter) + '">' + escHtml(chapLabel) + '</a></div>'
        + '<div class="toc-chap-body">';
      chap.sections.forEach(sect => {
        const sectLabel = buildSectionNo(sect.section) + (sect.sectionTitle ? " " + sect.sectionTitle : "");
        h += '<div class="toc-sect-row"><span class="toc-toggle" onclick="tocToggle(this)">▾</span>'
          + '<a class="toc-sect-label" href="#' + sectAnchorId(sect.section) + '">' + escHtml(sectLabel) + '</a></div>'
          + '<div class="toc-sect-body">';
        sect.articles.forEach(art => {
          const artLabel = buildArticleNo(art.articleNo) + (art.articleTitle ? "(" + art.articleTitle + ")" : "");
          h += '<a class="toc-art sect-child" href="#' + artAnchorId(art.articleNo) + '">' + escHtml(artLabel) + '</a>';
        });
        h += '</div>';
      });
      chap.articles.forEach(art => {
        const artLabel = buildArticleNo(art.articleNo) + (art.articleTitle ? "(" + art.articleTitle + ")" : "");
        h += '<a class="toc-art" href="#' + artAnchorId(art.articleNo) + '">' + escHtml(artLabel) + '</a>';
      });
      h += '</div>';
    } else {
      chap.articles.forEach(art => {
        const artLabel = buildArticleNo(art.articleNo) + (art.articleTitle ? "(" + art.articleTitle + ")" : "");
        h += '<a class="toc-art" href="#' + artAnchorId(art.articleNo) + '">' + escHtml(artLabel) + '</a>';
      });
    }
  });
  return '<nav class="toc" id="toc">' + h + '</nav>';
}

function renderFull(data) {
  const rows = data.rows || [];
  const amends = data.amendments || [];
  const articleMap = {};
  const articleOrder = [];

  rows.forEach(r => {
    const key = r.articleNo;
    if (!articleMap[key]) {
      articleMap[key] = { articleNo: r.articleNo, articleTitle: r.articleTitle, chapter: r.chapter || "", chapterTitle: r.chapterTitle || "", section: r.section || "", sectionTitle: r.sectionTitle || "", rows: [] };
      articleOrder.push(key);
    }
    articleMap[key].rows.push(r);
  });

  let bodyHtml = "";
  let prevChapter = null;
  let prevSection = null;

  articleOrder.forEach(key => {
    const art = articleMap[key];
    const artNo = buildArticleNo(art.articleNo);
    const artTitle = art.articleTitle ? "(" + art.articleTitle + ")" : "";
    const paraCount = art.rows.filter(r => r.paragraphNo && !r.itemNo).length;

    if (art.chapter && art.chapter !== prevChapter) {
      bodyHtml += '<div class="chapter-header" id="' + chapAnchorId(art.chapter) + '">' + escHtml(buildChapterNo(art.chapter)) + '&nbsp;&nbsp;' + escHtml(art.chapterTitle) + '</div>';
      prevChapter = art.chapter; prevSection = null;
    }
    if (art.section && art.section !== prevSection) {
      bodyHtml += '<div class="section-header" id="' + sectAnchorId(art.section) + '">' + escHtml(buildSectionNo(art.section)) + '&nbsp;&nbsp;' + escHtml(art.sectionTitle) + '</div>';
      prevSection = art.section;
    }

    const ART_LEVEL_TYPES = ["본조신설", "전부개정"];
    const artLevelRow = art.rows.find(r => ART_LEVEL_TYPES.indexOf(r.changeType || "") >= 0);
    const artLevelAnno = artLevelRow ? '<div class="art-revision">[' + escHtml(artLevelRow.changeType) + ' ' + escHtml(artLevelRow.changeDate) + ']</div>' : '';

    let lines = "";
    art.rows.forEach(r => {
      const ct = r.changeType || "";
      // 행별 revision_dates 우선, 없으면 단일 changeType/changeDate로 fallback
      let anno = "";
      if (r.revisionDates) {
        anno = '<span class="anno-rev">' + escHtml(r.revisionDates) + '</span>';
      } else if (r.changeDate && ART_LEVEL_TYPES.indexOf(ct) < 0 && ct && ct !== "신규") {
        if (ct === "삭제") anno = '<span class="anno-del">&lt;' + escHtml(r.changeDate) + '&gt;</span>';
        else anno = '<span class="anno-rev">(' + escHtml(ct) + ' ' + escHtml(r.changeDate) + ')</span>';
      }
      if (r.subitemNo) lines += '<span class="subitem-line">' + escHtml(String(r.subitemNo).replace(/\.+$/, "")) + ".&nbsp;" + allowHtml(r.content) + anno + '</span>';
      else if (r.itemNo) lines += '<span class="item-line">' + escHtml(String(r.itemNo).replace(/\.+$/, "")) + ".&nbsp;" + allowHtml(r.content) + anno + '</span>';
      else if (r.paragraphNo) lines += '<span class="para-line">' + (paraCount > 1 ? circle(r.paragraphNo) + "&nbsp;" : "") + allowHtml(r.content) + anno + '</span>';
    });

    bodyHtml += '<div class="article" id="' + artAnchorId(art.articleNo) + '">' + '<div class="article-title">' + escHtml(artNo + artTitle) + '</div>' + '<div class="article-body">' + lines + '</div>' + artLevelAnno + '</div>';
  });

  let amendHtml = "";
  if (amends.length > 0) {
    let items = "";
    amends.forEach(a => {
      const header = a.amendDate ? "부 칙(" + escHtml((a.amendType ? a.amendType + " " : "") + a.amendDate) + ")" : "부 칙";
      items += '<div class="amendment-item"><div class="amendment-header">' + header + '</div><div class="amendment-content">' + escHtml(a.content) + '</div></div>';
    });
    amendHtml = '<div class="amendment-section"><div class="amendment-section-title">부칙</div>' + items + '</div>';
  }

  const metaLines = [];
  if (data.meta) {
    const m = data.meta;
    if (m.enactDate) metaLines.push("제정 : " + escHtml(m.enactDate));
    if (m.lastAmendDate && m.lastAmendDate !== m.enactDate) {
      metaLines.push("개정 : " + escHtml(m.lastAmendDate));
    }
  }
  const metaHtml = metaLines.length ? metaLines.join("<br>") : "";
  const categoryBadge = (data.meta && data.meta.category)
    ? '<span class="reg-category-badge">' + escHtml(data.meta.category) + '</span>'
    : '';
  const downloadBtn = data.pdfUrl
    ? '<a href="' + escHtml(data.pdfUrl) + '" target="_blank" style="display:flex;align-items:center;gap:6px;padding:7px 14px;border:1px solid #e5e7eb;border-radius:6px;font-size:0.82rem;font-weight:500;color:#4b5563;text-decoration:none;transition:background 0.15s" onmouseover="this.style.background=\'#f1f3f5\'" onmouseout="this.style.background=\'\'"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>다운로드</a>'
    : '';

  const tocHtml = buildToc(data.regulationName, articleOrder, articleMap);

  document.title = data.regulationName + " — 부산외국어대학교 규정관리시스템";
  document.getElementById("app").innerHTML = tocHtml
    + '<div class="content-area"><div class="page-wrap">'
    + '<div class="reg-title-block">'
    + categoryBadge
    + '<h1 class="reg-title">' + escHtml(data.regulationName) + '</h1>'
    + '<div class="reg-meta-row">'
    + '<div class="reg-meta">' + metaHtml + '</div>'
    + downloadBtn
    + '</div>'
    + '</div>'
    + bodyHtml + amendHtml
    + '</div></div>';

  initTocHighlight();
}

function initTocHighlight() {
  const arts = document.querySelectorAll(".article[id]");
  const links = document.querySelectorAll(".toc-art");
  if (!arts.length || !links.length) return;

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      // 조항이 화면의 지정된 지점(정중앙 근처)에 들어왔을 때
      if (entry.isIntersecting) {
        const id = entry.target.id;
        links.forEach(a => {
          const href = a.getAttribute("href");
          if (href === "#" + id) {
            a.classList.add("active");
            // 하이라이트된 항목이 트리 내비게이터 밖으로 벗어나면 자동 스크롤로 보여줌
            a.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          } else {
            a.classList.remove("active");
          }
        });
      }
    });
  }, { 
    /* rootMargin: 상단 마진, 우측, 하단 마진, 좌측 순서 */
    /* 화면 상단에서 45%, 하단에서 45%를 제외한 나머지 10% 영역(중앙)만 감지 */
    rootMargin: "-45% 0px -45% 0px", 
    threshold: 0 
  });

  arts.forEach(el => observer.observe(el));
}

function loadFromLocalStorage() {
  const raw = localStorage.getItem("fullRegData");
  if (!raw) return false;
  const data = JSON.parse(raw);
  renderFull(data);
  if (data.pdfUrl) {
    const hdrBtn = document.getElementById("pdfBtnHeader");
    if (hdrBtn) { hdrBtn.href = data.pdfUrl; hdrBtn.style.display = "flex"; }
  }
  return true;
}

function loadFromApi(regParam) {
  document.getElementById("app").innerHTML =
    '<div style="text-align:center;padding:80px 32px;color:#6b7280">'
    + '<div style="width:32px;height:32px;border:3px solid #e5e7eb;border-top-color:#0d4a7a;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px"></div>'
    + '<p style="font-size:0.85rem">규정 데이터를 불러오는 중입니다…</p></div>';
  fetch(SCRIPT_URL + "?action=data")
    .then(r => r.json())
    .then(data => {
      const rows   = (data.rows || []).filter(r => r.regulationName === regParam);
      const amends = (data.amendments || []).filter(a => a.regulationName === regParam).sort((a,b) => a.seq - b.seq);
      const meta   = (data.regMeta || {})[regParam] || {};
      const payload = { regulationName: regParam, rows, amendments: amends, pdfUrl: meta.pdfUrl || "", meta };
      try { localStorage.setItem("fullRegData", JSON.stringify(payload)); } catch(e2) {}
      renderFull(payload);
      if (payload.pdfUrl) {
        const hdrBtn = document.getElementById("pdfBtnHeader");
        if (hdrBtn) { hdrBtn.href = payload.pdfUrl; hdrBtn.style.display = "flex"; }
      }
    })
    .catch(err => {
      document.getElementById("app").innerHTML =
        '<div style="text-align:center;padding:80px 32px;color:#6b7280">'
        + '<p style="font-size:1rem;margin-bottom:16px">데이터를 불러올 수 없습니다.<br>' + escHtml(err.message) + '</p>'
        + '<a href="search.html" style="display:inline-block;padding:8px 20px;border:1px solid #e5e7eb;border-radius:6px;font-size:0.85rem;color:#4b5563;text-decoration:none">← 검색으로 돌아가기</a>'
        + '</div>';
    });
}

(function() {
  const regParam = decodeURIComponent(new URLSearchParams(location.search).get("reg") || "");

  // localStorage 데이터가 요청된 규정과 일치할 때만 사용
  if (regParam) {
    try {
      const raw = localStorage.getItem("fullRegData");
      if (raw) {
        const data = JSON.parse(raw);
        if (data.regulationName === regParam) {
          renderFull(data);
          if (data.pdfUrl) {
            const hdrBtn = document.getElementById("pdfBtnHeader");
            if (hdrBtn) { hdrBtn.href = data.pdfUrl; hdrBtn.style.display = "flex"; }
          }
          return;
        }
      }
    } catch(e) {}
    loadFromApi(regParam);
  } else {
    // ?reg= 파라미터 없음: localStorage에서 그대로 로드
    if (!loadFromLocalStorage()) {
      document.getElementById("app").innerHTML =
        '<div style="text-align:center;padding:80px 32px;color:#6b7280">'
        + '<p style="font-size:1rem;margin-bottom:16px">데이터를 불러올 수 없습니다.<br>검색 페이지에서 규정을 다시 선택해 주세요.</p>'
        + '<a href="search.html" style="display:inline-block;padding:8px 20px;border:1px solid #e5e7eb;border-radius:6px;font-size:0.85rem;color:#4b5563;text-decoration:none">← 검색으로 돌아가기</a>'
        + '</div>';
    }
  }
})()
</script>
