<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>규정 목록</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<link rel="stylesheet" href="krds_tokens.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy:      var(--krds-color-light-secondary-70);  /* #063A74 */
    --navy-l:    var(--krds-color-light-secondary-60);  /* #1C589C */
    --gold:      #FDB71A;
    --gold-h:    #E59A00;
    --ink:       var(--krds-color-light-gray-90);       /* #1E2124 */
    --ink-soft:  var(--krds-color-light-gray-60);       /* #58616A */
    --ink-muted: var(--krds-color-light-gray-50);       /* #6D7882 */
    --paper:     var(--krds-color-light-gray-0);
    --muted:     var(--krds-color-light-gray-5);
    --card:      var(--krds-color-light-gray-0);
    --border:    var(--krds-color-light-gray-20);       /* #CDD1D5 */
    --success:   var(--krds-color-light-success-50);
    --danger:    var(--krds-color-light-danger-50);
  }
  html { height: 100%; }
  body {
    min-height: 100%; background: var(--paper); color: var(--ink);
    font-family: "Pretendard Variable", "Noto Sans KR", -apple-system, sans-serif;
    font-size: 16px; line-height: 1.6;
    display: flex; flex-direction: column;
  }

  /* ── 헤더 ── */
  .site-header {
    position: sticky; top: 0; z-index: 50;
    background: #fff; border-bottom: 1px solid var(--navy);
    padding: 32px 40px 24px;
  }
  .site-header-inner {
    max-width: 1360px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    gap: 32px;
  }
  .site-logo {
    display: flex; align-items: center; gap: 16px;
    font-size: 1.5rem; font-weight: 700; color: #1E2124;
    text-decoration: none; white-space: nowrap; flex-shrink: 0;
  }
  .site-logo img { height: 36px; width: auto; }
  .site-nav { display: flex; gap: 4px; align-items: center; flex: 1; justify-content: center; padding: 0 40px; }
  .site-nav a {
    font-size: 1.0625rem; font-weight: 700;
    color: var(--krds-light-color-text-subtle);
    text-decoration: none; white-space: nowrap;
    padding: 8px 12px; border-radius: 6px;
    transition: background 0.15s, color 0.15s;
  }
  .site-nav a:hover {
    color: var(--krds-light-color-text-secondary);
    background: var(--krds-light-color-action-secondary-hover);
  }
  .site-nav a.active {
    color: var(--krds-light-color-text-secondary);
    background: var(--krds-light-color-action-secondary-pressed);
    font-weight: 700;
  }
  .header-search-form { position: relative; width: 240px; flex-shrink: 0; }
  .header-search-icon {
    position: absolute; left: 0; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; color: #9ca3af; pointer-events: none;
  }
  .header-search-input {
    width: 100%; border: none;
    border-bottom: 1px solid var(--krds-light-color-border-gray-light);
    padding: 6px 4px 6px 22px; font-size: 0.88rem; font-family: inherit;
    background: transparent; color: var(--ink); outline: none; transition: border-color 0.15s;
  }
  .header-search-input:focus { border-bottom-color: var(--krds-light-color-border-secondary); }
  .header-search-input::placeholder { color: var(--krds-light-color-text-disabled); }

  /* ── 본문 레이아웃 ── */
  .main-wrap { width: 100%; padding: 24px 40px 60px; flex: 1; }

  /* ── 페이지 타이틀 (hero) ── */
  .page-title-block { text-align: center; padding: 24px 0; margin-bottom: 24px; }
  .page-title {
    font-size: 2.5rem; font-weight: 700; line-height: 1.5; letter-spacing: 0.0625rem;
    color: var(--krds-color-light-secondary-70); margin-bottom: 4px;
  }
  .page-subtitle { font-size: 1.1875rem; font-weight: 400; color: #000; line-height: 1.5; }

  /* ── 서브탭 ── KRDS main_menu_open_title style ── */
  .sub-tabs {
    display: flex; gap: 0;
    margin-bottom: 24px; overflow-x: auto;
  }
  .sub-tab {
    min-width: 157px;
    padding: 4px 8px 12px;
    font-size: 1.1875rem; font-weight: 700;
    color: var(--krds-light-color-text-basic);
    cursor: pointer; white-space: nowrap; background: none;
    border: none; border-bottom: 1px solid var(--krds-light-color-divider-gray);
    font-family: inherit; text-align: center;
    transition: background 0.15s, color 0.15s;
  }
  .sub-tab:hover {
    color: var(--krds-light-color-text-secondary);
    background: var(--krds-light-color-action-secondary-hover);
  }
  .sub-tab.active {
    background: var(--krds-light-color-action-secondary-pressed);
    color: var(--krds-light-color-text-secondary);
    border-bottom-color: var(--krds-light-color-divider-gray);
  }

  /* ── 규정 테이블 ── */
  .reg-table { width: 100%; border-collapse: collapse; }
  .reg-table thead tr {
    background: var(--krds-light-color-surface-secondary-subtler);
    border-bottom: 1px solid var(--krds-light-color-border-secondary-light);
  }
  .reg-table thead th {
    padding: 8px 16px; font-weight: 700; font-size: 0.9375rem;
    color: var(--krds-light-color-text-bolder); white-space: nowrap;
  }
  .reg-table thead th:first-child { padding-left: 36px; text-align: left; }
  .reg-table thead th.col-center { text-align: center; width: 215px; }
  .reg-table thead th.col-status { text-align: center; width: 80px; }
  .reg-table tbody tr {
    border-bottom: 1px solid var(--krds-light-color-divider-gray-light);
    cursor: pointer; transition: background 0.1s;
  }
  .reg-table tbody tr:hover { background: var(--krds-light-color-surface-secondary-subtler); }
  .reg-table tbody td {
    padding: 12px 16px; vertical-align: middle;
    font-size: 1.0625rem; color: var(--krds-light-color-text-subtle);
  }
  .reg-table tbody td:first-child { padding-left: 36px; }
  .td-center { text-align: center; }
  .td-status { text-align: center; white-space: nowrap; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 4px; font-size: 0.8125rem; font-weight: 700; }
  .badge-active   { background: var(--krds-light-color-surface-success-subtler); color: var(--krds-color-light-success-60); }
  .badge-inactive { background: var(--krds-light-color-surface-gray-subtle); color: var(--krds-light-color-text-disabled); }
  .badge-new      { background: var(--krds-light-color-surface-primary-subtler); color: var(--krds-color-light-primary-60); }

  .no-result { text-align: center; padding: 60px 0; color: var(--ink-muted); font-size: 0.9rem; }

  /* ── 푸터 ── */
  .site-footer {
    padding: 16px 40px; background: var(--krds-light-color-surface-gray-subtle);
    border-top: 1px solid var(--krds-light-color-surface-gray-subtle);
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    font-size: 0.9375rem; color: #464C53; line-height: 1.5; font-weight: 400;
  }
  .site-footer-text { text-align: center; flex: 1; }
  .admin-btn {
    background: transparent;
    color: var(--krds-light-color-text-disabled);
    border: 1px solid var(--krds-light-color-border-gray-light);
    border-radius: 6px; padding: 5px 12px; font-size: 0.8rem; font-weight: 500;
    font-family: inherit; cursor: pointer; transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
  }
  .admin-btn:hover {
    background: var(--krds-light-color-button-tertiary-fill-hover);
    color: var(--krds-light-color-text-secondary);
    border-color: var(--krds-light-color-border-secondary);
  }

  /* ── 관리자 모달 ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal {
    background: #fff; padding: 32px 36px; width: 340px; border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12); border: 1px solid var(--border);
  }
  .modal h3 { font-size: 1rem; font-weight: 700; margin-bottom: 6px; color: var(--ink); text-align: center; }
  .modal p { font-size: 0.8rem; color: var(--ink-muted); margin-bottom: 20px; line-height: 1.6; text-align: center; }
  .modal input[type="password"] {
    width: 100%; border: 1px solid var(--krds-light-color-border-gray); border-radius: 6px;
    padding: 10px 12px; font-size: 0.88rem; font-family: inherit;
    outline: none; margin-bottom: 12px; transition: border-color 0.15s;
  }
  .modal input[type="password"]:focus { border-color: var(--krds-light-color-border-secondary); }
  .modal-btns { display: flex; gap: 8px; flex-direction: column; }
  .modal-confirm {
    width: 100%;
    background: var(--krds-light-color-button-primary-fill);
    color: var(--krds-light-color-text-inverse-static);
    border-radius: 6px; border: none; padding: 10px;
    font-family: inherit; font-weight: 600; font-size: 0.85rem;
    cursor: pointer; transition: background 0.15s;
  }
  .modal-confirm:hover { background: var(--krds-light-color-button-primary-fill-hover); }
  .modal-confirm:disabled { background: var(--krds-light-color-button-disabled-fill); color: var(--krds-light-color-text-disabled-on); cursor: not-allowed; }
  .modal-cancel {
    width: 100%; background: transparent;
    color: var(--krds-light-color-text-subtle);
    border-radius: 6px;
    border: 1px solid var(--krds-light-color-button-tertiary-border);
    padding: 10px; font-family: inherit; font-weight: 600;
    font-size: 0.85rem; cursor: pointer; transition: background 0.15s;
  }
  .modal-cancel:hover { background: var(--krds-light-color-button-tertiary-fill-hover); color: var(--ink); }
  .modal-msg { font-size: 0.78rem; margin-top: 10px; min-height: 18px; font-weight: 500; text-align: center; }
  .modal-msg.ok  { color: var(--success); }
  .modal-msg.err { color: var(--danger); }

  @media (max-width: 680px) {
    .site-nav, .header-search-form { display: none; }
    .main-wrap { padding: 24px 16px 60px; }
    .td-dept, .td-status { display: none; }
  }
</style>
</head>
<body>

<!-- 헤더 -->
<header class="site-header">
  <div class="site-header-inner">
    <a href="./" class="site-logo">
      <img src="https://github.com/DYK1323/bufs_regulation/blob/%EB%94%94%EC%9E%90%EC%9D%B8-%EA%B0%9C%EC%84%A0/BUFS_Block_CMYK.jpg?raw=true" alt="부산외국어대학교 로고">
      부산외국어대학교 규정관리시스템
    </a>
    <nav class="site-nav" id="siteNav">
      <a href="category.html?cat=1">법인</a>
      <a href="category.html?cat=2">학칙</a>
      <a href="category.html?cat=3">위원회</a>
      <a href="category.html?cat=4">학사규정</a>
      <a href="category.html?cat=5">부속기관</a>
      <a href="category.html?cat=6">기타</a>
    </nav>
    <form class="header-search-form" onsubmit="event.preventDefault(); headerSearch();">
      <svg class="header-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="header-search-input" type="text" id="headerKw" placeholder="규정 검색..." autocomplete="off">
    </form>
  </div>
</header>

<!-- 본문 -->
<div class="main-wrap">
  <div class="page-title-block">
    <div class="page-title" id="pageTitle">규정 목록</div>
    <div class="page-subtitle" id="pageSubtitle"></div>
  </div>
  <div id="subTabs"></div>
  <div id="regTableWrap"></div>
</div>

<footer class="site-footer">
  <div class="site-footer-text">
    46234 부산광역시 금정구 금샘로485번길 65 &nbsp; 대표전화 : 051.509.5000 &nbsp; FAX : 051.509.5005<br>
    COPYRIGHT© 2008 BUSAN UNIVERSITY OF FOREIGN STUDIES. ALL RIGHTS RESERVED.
  </div>
  <button class="admin-btn" onclick="openAdminModal()">⚙ 관리자</button>
</footer>

<!-- 관리자 모달 -->
<div class="modal-overlay" id="adminModal">
  <div class="modal">
    <h3>관리자</h3>
    <p>스프레드시트 수정 후 캐시를 초기화하면<br>최신 데이터가 반영됩니다.</p>
    <input type="password" id="adminPw" placeholder="관리자 비밀번호"
           onkeydown="if(event.key==='Enter') confirmClear()">
    <div class="modal-btns">
      <button class="modal-confirm" id="confirmBtn" onclick="confirmClear()">캐시 초기화</button>
      <button class="modal-cancel" onclick="closeAdminModal()">취소</button>
    </div>
    <div class="modal-msg" id="modalMsg"></div>
  </div>
</div>

<script>
const CAT_LABELS = { "1":"법인", "2":"학칙", "3":"위원회", "4":"학사규정", "5":"부속기관", "6":"기타" };
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx5Sqkb3yN1yPqmjSLv_9JIFUuyEvEqVA0Lw6s4OlLwUwtmRj1zMz7NXAautTuzngbg/exec";

function getParam(key) { return new URLSearchParams(location.search).get(key) || ""; }
function escHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

let regList = [];
let currentCatNo = getParam("cat");
let currentSubNo = getParam("sub");

// 헤더 nav 활성화
document.querySelectorAll(".site-nav a").forEach(a => {
  const url = new URL(a.href, location.origin);
  if (url.searchParams.get("cat") === currentCatNo) a.classList.add("active");
});

function headerSearch() {
  const kw = document.getElementById("headerKw").value.trim();
  if (kw) location.href = "search.html?q=" + encodeURIComponent(kw);
}

function init() {
  try {
    const stored = localStorage.getItem("regList");
    if (stored) { regList = JSON.parse(stored); render(); return; }
  } catch(e) {}
  document.getElementById("regTableWrap").innerHTML = '<div class="no-result">데이터를 불러오는 중입니다…</div>';
  fetch(SCRIPT_URL + "?action=data")
    .then(r => r.json())
    .then(data => {
      regList = data.regList || [];
      try { localStorage.setItem("regList", JSON.stringify(regList)); } catch(e) {}
      render();
    })
    .catch(err => {
      document.getElementById("regTableWrap").innerHTML = '<div class="no-result">데이터 로드 실패: ' + escHtml(err.message) + '</div>';
    });
}

function getSubCategories(catNo) {
  const subMap = {};
  regList.filter(r => String(r.categoryNo) === catNo && r.categorySubNo && r.categorySub).forEach(r => {
    const k = String(r.categorySubNo);
    if (!subMap[k]) subMap[k] = r.categorySub;
  });
  return Object.keys(subMap).sort((a,b) => Number(a)-Number(b)).map(no => ({ no, name: subMap[no] }));
}

function render() {
  const catLabel = CAT_LABELS[currentCatNo] || "규정 목록";
  document.title = catLabel + " — 부산외국어대학교 규정관리시스템";
  document.getElementById("pageTitle").textContent = "제" + currentCatNo + "편 " + catLabel;

  // 학사규정 서브탭
  if (currentCatNo === "4") {
    const subList = getSubCategories("4");
    if (subList.length) {
      let tabHtml = '<div class="sub-tabs">';
      tabHtml += '<button class="sub-tab' + (!currentSubNo ? ' active' : '') + '" onclick="navigate(\'4\',\'\')">' + '전체' + '</button>';
      subList.forEach(sub => {
        const label = "제" + sub.no + "장 " + sub.name;
        tabHtml += '<button class="sub-tab' + (currentSubNo === sub.no ? ' active' : '') + '" onclick="navigate(\'4\',\'' + escHtml(sub.no) + '\')">' + escHtml(label) + '</button>';
      });
      tabHtml += '</div>';
      document.getElementById("subTabs").innerHTML = tabHtml;
    } else {
      document.getElementById("subTabs").innerHTML = "";
    }
    if (currentSubNo) {
      const sub = getSubCategories("4").find(s => s.no === currentSubNo);
      document.getElementById("pageSubtitle").textContent = sub ? "제" + sub.no + "장 " + sub.name : "";
    } else {
      document.getElementById("pageSubtitle").textContent = "";
    }
  } else {
    document.getElementById("subTabs").innerHTML = "";
    document.getElementById("pageSubtitle").textContent = "";
  }

  let filtered = regList.filter(r => String(r.categoryNo) === currentCatNo);
  if (currentCatNo === "4" && currentSubNo) {
    filtered = filtered.filter(r => String(r.categorySubNo) === currentSubNo);
  }
  renderTable(filtered);
}

function renderTable(list) {
  const wrap = document.getElementById("regTableWrap");
  if (!list.length) { wrap.innerHTML = '<div class="no-result">해당 분류의 규정이 없습니다.</div>'; return; }

  list = list.slice().sort((a, b) => a.regName.localeCompare(b.regName, "ko"));

  const fileIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>';
  const calIcon  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>';

  const rows = list.map(r => {
    const nameEsc = r.regName.replace(/\\/g,"\\\\").replace(/'/g,"\\'");
    const statusBadge = r.status === "폐지"
      ? '<span class="badge badge-inactive">' + escHtml(r.status) + '</span>'
      : r.status === "신설"
      ? '<span class="badge badge-new">' + escHtml(r.status) + '</span>'
      : (r.status ? '<span class="badge badge-active">' + escHtml(r.status) + '</span>' : '');
    return '<tr onclick="openReg(\'' + nameEsc + '\')" title="' + escHtml(r.regName) + '">'
      + '<td>' + escHtml(r.regName) + '</td>'
      + '<td class="td-center">' + escHtml(r.dept || "") + '</td>'
      + '<td class="td-center">' + escHtml(r.revisedDate || "") + '</td>'
      + '<td class="td-status">' + statusBadge + '</td>'
      + '</tr>';
  }).join("");

  wrap.innerHTML = '<table class="reg-table">'
    + '<thead><tr><th>규정명</th><th class="col-center">담당부서</th><th class="col-center">개정일</th><th class="col-status">상태</th></tr></thead>'
    + '<tbody>' + rows + '</tbody></table>';
}

function navigate(catNo, subNo) {
  currentCatNo = catNo; currentSubNo = subNo || "";
  const params = new URLSearchParams({ cat: catNo });
  if (subNo) params.set("sub", subNo);
  history.pushState({}, "", "?" + params.toString());
  // nav 활성화 갱신
  document.querySelectorAll(".site-nav a").forEach(a => {
    const url = new URL(a.href, location.origin);
    a.classList.toggle("active", url.searchParams.get("cat") === catNo);
  });
  render();
}

window.addEventListener("popstate", function() {
  currentCatNo = getParam("cat"); currentSubNo = getParam("sub"); render();
});

function openReg(regName) {
  localStorage.setItem("targetRegulation", regName);
  const stored = localStorage.getItem("fullRegData");
  if (stored) {
    try { const p = JSON.parse(stored); if (p.regulationName === regName) { location.href = "full.html"; return; } } catch(e) {}
  }
  // API fetch 후 이동
  const loadMsg = document.createElement("div");
  loadMsg.style.cssText = "position:fixed;inset:0;background:rgba(255,255,255,0.8);display:flex;align-items:center;justify-content:center;z-index:999;font-size:0.9rem;color:#6b7280";
  loadMsg.textContent = "규정 데이터 로드 중…";
  document.body.appendChild(loadMsg);

  fetch(SCRIPT_URL + "?action=data")
    .then(r => r.json())
    .then(data => {
      const allRows = data.rows || [];
      const amendments = (data.amendments || []).filter(a => a.regulationName === regName).sort((a,b) => a.seq - b.seq);
      const meta = (data.regMeta || {})[regName] || {};
      localStorage.setItem("fullRegData", JSON.stringify({
        regulationName: regName, rows: allRows.filter(r => r.regulationName === regName),
        amendments, pdfUrl: meta.pdfUrl || "", meta
      }));
      try { localStorage.setItem("regList", JSON.stringify(data.regList || [])); } catch(e) {}
      location.href = "full.html";
    })
    .catch(err => { document.body.removeChild(loadMsg); alert("데이터 로드 실패: " + err.message); });
}

init();

function openAdminModal() {
  document.getElementById("adminPw").value = "";
  document.getElementById("modalMsg").textContent = "";
  document.getElementById("modalMsg").className = "modal-msg";
  document.getElementById("confirmBtn").disabled = false;
  document.getElementById("adminModal").classList.add("show");
  setTimeout(() => document.getElementById("adminPw").focus(), 100);
}

function closeAdminModal() {
  document.getElementById("adminModal").classList.remove("show");
}

function confirmClear() {
  const pw  = document.getElementById("adminPw").value;
  const btn = document.getElementById("confirmBtn");
  const msg = document.getElementById("modalMsg");
  if (!pw) { msg.textContent = "비밀번호를 입력해주세요."; msg.className = "modal-msg err"; return; }
  btn.disabled = true;
  msg.textContent = "초기화 중…";
  msg.className = "modal-msg";
  fetch(SCRIPT_URL + "?action=clearCache&pw=" + encodeURIComponent(pw))
    .then(r => r.json())
    .then(result => {
      btn.disabled = false;
      msg.textContent = result.message;
      msg.className = "modal-msg " + (result.success ? "ok" : "err");
      if (result.success) {
        setTimeout(function() {
          closeAdminModal();
          try { localStorage.removeItem("regList"); sessionStorage.removeItem("searchData"); } catch(e) {}
          location.reload();
        }, 1200);
      }
    })
    .catch(err => {
      btn.disabled = false;
      msg.textContent = "오류: " + err.message;
      msg.className = "modal-msg err";
    });
}
</script>
