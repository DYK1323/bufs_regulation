<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부산외국어대학교 규정 검색 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy:      #0d4a7a;
    --navy-l:    #1a6aaa;
    --gold:      #FDB71A;
    --gold-h:    #E59A00;
    --ink:       #1a1a1a;
    --ink-soft:  #4B5563;
    --ink-muted: #6B7280;
    --paper:     #ffffff;
    --muted:     #f1f3f5;
    --card:      #ffffff;
    --mark-bg:   #fffbf0;
    --border:    #e5e7eb;
    --success:   #059669;
    --danger:    #DC2626;
  }
  html, body {
    min-height: 100%;
    background: var(--paper);
    color: var(--ink);
    font-family: "Pretendard Variable", "Noto Sans KR", -apple-system, sans-serif;
    font-size: 16px;
    line-height: 1.6;
  }

  /* ── 헤더 ── */
  .site-header {
    position: sticky; top: 0; z-index: 50;
    background: #fff; border-bottom: 1px solid var(--navy);
    padding: 0 32px;
  }
  .site-header-inner {
    max-width: 1280px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    gap: 24px; height: 64px;
  }
  .site-logo {
    display: flex; align-items: center; gap: 12px;
    font-size: 1rem; font-weight: 700; color: #404040;
    text-decoration: none; white-space: nowrap; flex-shrink: 0;
  }
  .site-logo img { height: 1.5em; width: auto; }

  .site-nav {
    display: flex; gap: 24px; align-items: center;
  }
  .site-nav a {
    font-size: 0.9rem; font-weight: 500; color: #4B5563;
    text-decoration: none; white-space: nowrap; transition: color 0.15s;
  }
  .site-nav a:hover { color: var(--ink); }
  .site-nav a.active { color: var(--gold); font-weight: 700; }

  .header-search-form {
    position: relative; width: 240px; flex-shrink: 0;
  }
  .header-search-icon {
    position: absolute; left: 0; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; color: #9ca3af; pointer-events: none;
  }
  .header-search-input {
    width: 100%; border: none; border-bottom: 1px solid #d1d5db;
    padding: 6px 4px 6px 22px; font-size: 0.88rem; font-family: inherit;
    background: transparent; color: var(--ink); outline: none;
    transition: border-color 0.15s;
  }
  .header-search-input:focus { border-bottom-color: #6b7280; }
  .header-search-input::placeholder { color: #9CA3AF; }

  /* ── 페이지 본문 ── */
  .page-wrap { max-width: 1280px; margin: 0 auto; padding: 0 32px 80px; }

  /* 초기 로딩 오버레이 */
  .init-overlay {
    position: fixed; inset: 0; background: rgba(255,255,255,0.92);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px;
    z-index: 100; transition: opacity 0.4s; backdrop-filter: blur(4px);
  }
  .init-overlay.hidden { opacity: 0; pointer-events: none; }
  .init-overlay .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border); border-top-color: var(--navy);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  .init-overlay p { font-size: 0.85rem; font-weight: 500; color: var(--ink-muted); }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 홈 히어로 검색 ── */
  .hero { text-align: center; padding: 60px 0 48px; }
  .hero h1 {
    font-size: 2.25rem; font-weight: 700; color: var(--navy);
    margin-bottom: 12px; font-family: "Noto Sans KR", sans-serif;
  }
  .hero p { font-size: 1rem; color: var(--ink-muted); margin-bottom: 32px; }

  .search-label { display: none; }
  .search-row {
    display: flex; align-items: center;
    width: 100%; max-width: 560px; margin: 0 auto;
    border: 1px solid #d1d5db; border-radius: 9999px;
    background: #fff; overflow: hidden;
    padding: 4px 4px 4px 20px;
  }
  .search-row:focus-within { border-color: #9ca3af; box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
  .search-input {
    flex: 1; border: none; outline: none;
    font-size: 0.95rem; font-family: inherit; background: transparent; color: var(--ink);
    padding: 8px 0;
  }
  .search-input::placeholder { color: #9CA3AF; }
  .search-btn {
    border: none; background: transparent; color: var(--ink);
    padding: 8px 20px; font-size: 0.95rem; font-weight: 700;
    font-family: inherit; cursor: pointer; transition: color 0.15s; white-space: nowrap;
    flex-shrink: 0;
  }
  .search-btn:hover { color: var(--navy); }
  .search-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .status-bar {
    font-size: 0.85rem; color: var(--ink-muted); font-weight: 500;
    margin: 12px 0 16px; min-height: 18px; text-align: center;
  }

  /* ── 최근 개정 목록 ── */
  .recent-section { margin-bottom: 48px; }
  .section-header-row {
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 12px; margin-bottom: 0;
    border-bottom: 2px solid var(--border);
    margin-bottom: 0;
  }
  .section-header-row h2 { font-size: 1.25rem; font-weight: 700; color: var(--ink); font-family: "Noto Sans KR", sans-serif; }
  .section-header-row span { font-size: 0.82rem; color: var(--ink-muted); }

  .recent-list { display: flex; flex-direction: column; }
  .recent-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px; border-bottom: 1px solid var(--border);
    border-top: 1px solid var(--border); margin-top: -1px;
    cursor: pointer; transition: background 0.12s; gap: 16px;
  }
  .recent-item:hover { background: rgba(0,0,0,0.025); }
  .recent-item-left { display: flex; align-items: center; gap: 10px; flex: 1; }
  .recent-item-icon { width: 16px; height: 16px; color: var(--ink-muted); flex-shrink: 0; }
  .recent-item-name { font-size: 0.9rem; color: var(--ink); }
  .recent-item-name:hover { color: var(--navy); }
  .recent-item-date { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; color: var(--ink-muted); white-space: nowrap; flex-shrink: 0; }
  .recent-item-date svg { width: 14px; height: 14px; }

  .show-more-row {
    padding: 14px; text-align: center;
    background: rgba(0,0,0,0.015); border-bottom: 1px solid var(--border); margin-top: -1px;
  }
  .show-more-btn {
    background: none; border: none; cursor: pointer;
    font-size: 0.85rem; color: var(--navy); font-weight: 500; font-family: inherit;
    transition: opacity 0.15s;
  }
  .show-more-btn:hover { opacity: 0.75; }

  /* ── 검색 결과 ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .result-table-wrap {
    width: 100%; animation: fadeUp 0.25s ease both;
    background: var(--card); border-radius: 6px; border: 1px solid var(--border); overflow: hidden;
  }
  .result-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  .result-table thead tr { background: var(--muted); }
  .result-table thead th {
    padding: 11px 16px; text-align: left;
    font-weight: 700; font-size: 0.8rem; color: var(--ink); white-space: nowrap;
  }
  .col-reg  { width: 220px; }
  .col-date { width: 140px; }
  .result-table tbody tr { border-top: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
  .result-table tbody tr:hover { background: rgba(0,0,0,0.025); }
  .result-table tbody tr.group-start td { border-top: 1px solid var(--border); }
  .result-table tbody td { padding: 13px 16px; vertical-align: top; line-height: 1.6; color: var(--ink-soft); }
  .cell-reg { font-weight: 600; color: var(--ink) !important; font-size: 0.85rem; }
  .cell-date { color: var(--ink-muted) !important; font-size: 0.82rem; }

  .art-title { font-weight: 600; color: var(--navy); margin-bottom: 4px; font-size: 0.85rem; }
  .art-body  { line-height: 1.7; font-size: 0.88rem; }
  .para-line    { display: block; padding-left: 8px; }
  .item-line    { display: block; padding-left: 24px; text-indent: -1.2em; }
  .subitem-line { display: block; padding-left: 40px; text-indent: -1.2em; }

  .click-hint { font-size: 0.78rem; color: var(--ink-muted); margin-bottom: 12px; font-weight: 500; }

  mark { background: var(--mark-bg); color: inherit; padding: 0 3px; border-radius: 3px; font-weight: 600; }

  .no-result { text-align: center; padding: 60px 0; color: var(--ink-muted); }
  .no-result .icon { font-size: 2rem; display: block; margin-bottom: 12px; opacity: 0.7; }

  /* ── 규정 섹션 헤더 ── */
  .section-head {
    font-size: 1rem; font-weight: 700; color: var(--ink);
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 12px; margin: 8px 0 0;
    border-bottom: 2px solid var(--border);
  }
  .section-head strong {
    font-size: 0.8rem; font-weight: 400; color: var(--ink-muted);
  }

  /* ── 규정 카드 ── */
  .reg-cards { display: flex; flex-direction: column; margin-bottom: 16px; }
  .reg-card {
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    padding: 14px 24px; border-bottom: 1px solid var(--border);
    border-top: 1px solid var(--border); margin-top: -1px;
    cursor: pointer; transition: background 0.1s;
  }
  .reg-card:hover { background: rgba(0,0,0,0.025); }
  .reg-card-left { display: flex; align-items: center; gap: 10px; flex: 1; }
  .reg-card-name { font-size: 0.9rem; color: var(--ink); }
  .reg-card-date { font-size: 0.82rem; color: var(--ink-muted); white-space: nowrap; }
  .reg-card-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .reg-card-pdf {
    display: inline-block; padding: 3px 10px; border: 1px solid var(--border);
    border-radius: 4px; font-size: 0.75rem; font-weight: 600; color: var(--ink-soft);
    text-decoration: none; transition: background 0.15s;
  }
  .reg-card-pdf:hover { background: var(--muted); }

  /* ── 관리자 UI ── */
  .admin-btn {
    position: fixed; bottom: 28px; right: 28px;
    background: var(--muted); color: var(--ink-soft); border: 1px solid var(--border);
    border-radius: 6px; padding: 7px 14px; font-size: 0.78rem; font-weight: 600;
    font-family: inherit; cursor: pointer; transition: all 0.15s;
  }
  .admin-btn:hover { background: var(--navy); color: #fff; border-color: var(--navy); }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal {
    background: #fff; padding: 32px 36px; width: 340px; border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12); border: 1px solid var(--border);
  }
  .modal h3 { font-size: 1rem; font-weight: 700; margin-bottom: 6px; color: var(--ink); text-align: center; }
  .modal p { font-size: 0.8rem; color: var(--ink-muted); margin-bottom: 20px; line-height: 1.6; text-align: center; }
  .modal input[type="password"] {
    width: 100%; border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 12px; font-size: 0.88rem; font-family: inherit;
    outline: none; margin-bottom: 12px; transition: border-color 0.15s;
  }
  .modal input[type="password"]:focus { border-color: var(--navy); }
  .modal-btns { display: flex; gap: 8px; flex-direction: column; }
  .modal-confirm {
    width: 100%; background: var(--navy); color: #fff; border-radius: 6px;
    border: none; padding: 10px; font-family: inherit; font-weight: 600;
    font-size: 0.85rem; cursor: pointer; transition: background 0.15s;
  }
  .modal-confirm:hover { background: var(--navy-l); }
  .modal-confirm:disabled { opacity: 0.5; cursor: not-allowed; }
  .modal-cancel {
    width: 100%; background: transparent; color: var(--ink-muted); border-radius: 6px;
    border: 1px solid var(--border); padding: 10px; font-family: inherit; font-weight: 600;
    font-size: 0.85rem; cursor: pointer; transition: background 0.15s;
  }
  .modal-cancel:hover { background: var(--muted); color: var(--ink); }
  .modal-msg { font-size: 0.78rem; margin-top: 10px; min-height: 18px; font-weight: 500; text-align: center; }
  .modal-msg.ok  { color: var(--success); }
  .modal-msg.err { color: var(--danger); }

  .site-footer {
    margin-top: 48px; padding-top: 20px; border-top: 1px solid var(--border);
    font-size: 0.75rem; color: var(--ink-muted); text-align: center; font-weight: 400;
  }
  .art-body table { border-collapse: collapse; margin: 10px 0; font-size: 0.85rem; }
  .art-body th, .art-body td { border: 1px solid #d1d5db; padding: 3px 8px; text-align: center; }
  .art-body th { background: #f3f4f6; font-weight: 600; }
</style>
</head>
<body>

<!-- 초기 로딩 오버레이 -->
<div class="init-overlay" id="initOverlay">
  <div class="spinner"></div>
  <p id="initMsg">규정 데이터를 불러오는 중입니다…</p>
</div>

<!-- 헤더 -->
<header class="site-header">
  <div class="site-header-inner">
    <a href="./" class="site-logo">
      <img src="https://www.bufs.ac.kr/data/logo/top_logo_w.png" alt="부산외국어대학교 로고">
      부산외국어대학교 규정관리시스템
    </a>
    <nav class="site-nav">
      <a href="category.html?cat=1">법인</a>
      <a href="category.html?cat=2">학칙</a>
      <a href="category.html?cat=3">위원회</a>
      <a href="category.html?cat=4">학사규정</a>
      <a href="category.html?cat=5">부속기관</a>
      <a href="category.html?cat=6">기타</a>
    </nav>
    <form class="header-search-form" onsubmit="event.preventDefault(); goSearch(document.getElementById('kwHeader').value);">
      <svg class="header-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="kwHeader" class="header-search-input" type="text" placeholder="규정 검색..." autocomplete="off">
    </form>
  </div>
</header>

<div class="page-wrap">
  <!-- 히어로 검색 -->
  <div class="hero">
    <h1>규정 검색하기</h1>
    <p>부산외국어대학교의 모든 규정을 검색하고 조회할 수 있습니다</p>
    <label class="search-label" for="kw">키워드 입력</label>
    <form class="search-row" onsubmit="event.preventDefault(); goSearch(document.getElementById('kw').value);">
      <input id="kw" class="search-input" type="text"
             placeholder="규정명, 키워드로 검색하세요..."
             autocomplete="off">
      <button class="search-btn" type="submit">검색</button>
    </form>
  </div>

  <div id="recentSection" class="recent-section" style="display:none">
    <div class="section-header-row">
      <h2>최근 개정된 규정</h2>
      <span id="recentCount"></span>
    </div>
    <div class="recent-list" id="recentList"></div>
  </div>

  <footer class="site-footer">
    규정 본문 기준 전문 검색 &nbsp;·&nbsp; record_status = active 행만 포함
  </footer>
</div>

<!-- 관리자 버튼 -->
<button class="admin-btn" onclick="openAdminModal()">⚙ 관리자</button>

<!-- 관리자 모달 -->
<div class="modal-overlay" id="adminModal">
  <div class="modal">
    <h3>관리자</h3>
    <p>스프레드시트 수정 후 캐시를 초기화하면<br>최신 데이터가 반영됩니다.</p>
    <input type="password" id="adminPw" placeholder="관리자 비밀번호"
           onkeydown="if(event.key==='Enter') confirmClear()">
    <div class="modal-btns">
      <button class="modal-confirm" id="confirmBtn" onclick="confirmClear()">캐시 초기화</button>
      <button class="modal-confirm" id="syncPdfBtn" onclick="confirmSyncPdf()" style="background:#375623">PDF 링크 매핑</button>
      <button class="modal-cancel" onclick="closeAdminModal()">취소</button>
    </div>
    <div class="modal-msg" id="modalMsg"></div>
  </div>
</div>

<script>
const SCRIPT_URL     = "https://script.google.com/macros/s/AKfycbx5Sqkb3yN1yPqmjSLv_9JIFUuyEvEqVA0Lw6s4OlLwUwtmRj1zMz7NXAautTuzngbg/exec";
let REG_META_MAP     = {};
let REG_LIST         = [];
let RECENT_AMENDMENTS = [];

// ── 유틸 ─────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function goSearch(kw) {
  kw = (kw || "").trim();
  if (!kw) return;
  location.href = "search.html?q=" + encodeURIComponent(kw);
}

// ── 초기 데이터 로드 ─────────────────────────────────────────
function initData() {
  fetch(SCRIPT_URL + "?action=data")
    .then(response => response.json())
    .then(data => {
      REG_META_MAP      = data.regMeta          || {};
      REG_LIST          = data.regList          || [];
      RECENT_AMENDMENTS = data.recentAmendments || [];

      // localStorage에 regList 저장 (category.html에서 사용)
      try { localStorage.setItem("regList", JSON.stringify(REG_LIST)); } catch(e) {}
      // sessionStorage에 검색 데이터 저장 (search.html에서 재사용)
      try {
        sessionStorage.setItem("searchData", JSON.stringify({
          rows: data.rows || [], amendments: data.amendments || [], regMeta: data.regMeta || {}
        }));
      } catch(e) {}

      document.getElementById("initOverlay").classList.add("hidden");
      renderRecentAmendments();
    })
    .catch(err => {
      const overlay = document.getElementById("initOverlay");
      overlay.querySelector(".spinner").style.display = "none";
      const msg = document.getElementById("initMsg");
      msg.innerHTML = "데이터 로드 실패: " + escHtml(err.message)
        + '<br><button onclick="location.reload()" style="margin-top:12px;padding:6px 16px;border:1px solid #1B3A5C;border-radius:6px;background:#1B3A5C;color:#fff;cursor:pointer;font-size:0.82rem;">새로고침</button>';
    });
}


function renderRecentAmendments() {
  if (!RECENT_AMENDMENTS.length) return;
  const section = document.getElementById("recentSection");
  const list    = document.getElementById("recentList");
  const countEl = document.getElementById("recentCount");
  if (countEl) countEl.textContent = "총 " + RECENT_AMENDMENTS.length;

  const SHOW_INIT = 10;
  let showAll = false;

  function buildList() {
    const items = showAll ? RECENT_AMENDMENTS : RECENT_AMENDMENTS.slice(0, SHOW_INIT);
    const iconSvg = '<svg class="recent-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>';
    const calSvg  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>';
    let html = items.map(item => {
      const nameEsc = item.regulationName.replace(/\\/g,"\\\\").replace(/'/g,"\\'");
      return '<div class="recent-item" onclick="openFullPage(\'' + nameEsc + '\')">'
        + '<div class="recent-item-left">' + iconSvg + '<span class="recent-item-name">' + escHtml(item.regulationName) + '</span></div>'
        + '<div class="recent-item-date">' + calSvg + escHtml(item.amendDate || "") + '</div>'
        + '</div>';
    }).join("");
    if (!showAll && RECENT_AMENDMENTS.length > SHOW_INIT) {
      const more = RECENT_AMENDMENTS.length - SHOW_INIT;
      html += '<div class="show-more-row"><button class="show-more-btn" id="showMoreBtn">더보기 (' + more + '개 더 있음)</button></div>';
    }
    list.innerHTML = html;
    if (!showAll && RECENT_AMENDMENTS.length > SHOW_INIT) {
      document.getElementById("showMoreBtn").addEventListener("click", function() {
        showAll = true; buildList();
      });
    }
  }
  buildList();
  section.style.display = "";
}

function openFullPage(regulationName) {
  location.href = "full.html?reg=" + encodeURIComponent(regulationName);
}

// ── 관리자 모달 ──────────────────────────────────────────────
function openAdminModal() {
  document.getElementById("adminPw").value = "";
  document.getElementById("modalMsg").textContent = "";
  document.getElementById("modalMsg").className = "modal-msg";
  document.getElementById("confirmBtn").disabled = false;
  document.getElementById("adminModal").classList.add("show");
  setTimeout(() => document.getElementById("adminPw").focus(), 100);
}

function closeAdminModal() {
  document.getElementById("adminModal").classList.remove("show");
}

function confirmClear() {
  const pw  = document.getElementById("adminPw").value;
  const btn = document.getElementById("confirmBtn");
  const msg = document.getElementById("modalMsg");

  if (!pw) { msg.textContent = "비밀번호를 입력해주세요."; msg.className = "modal-msg err"; return; }

  btn.disabled = true;
  msg.textContent = "초기화 중…";
  msg.className = "modal-msg";

  fetch(SCRIPT_URL + "?action=clearCache&pw=" + encodeURIComponent(pw))
    .then(response => response.json())
    .then(result => {
      btn.disabled = false;
      msg.textContent = result.message;
      msg.className = "modal-msg " + (result.success ? "ok" : "err");

      if (result.success) {
        setTimeout(function() {
          closeAdminModal();
          document.getElementById("initOverlay").classList.remove("hidden");
          document.getElementById("initMsg").textContent = "최신 데이터를 불러오는 중입니다…";
          REG_META_MAP = {}; REG_LIST = []; RECENT_AMENDMENTS = [];
          try { sessionStorage.removeItem("searchData"); } catch(e) {}
          initData();
        }, 1200);
      }
    })
    .catch(err => {
      btn.disabled = false;
      msg.textContent = "오류: " + err.message;
      msg.className = "modal-msg err";
    });
}

function confirmSyncPdf() {
  const pw  = document.getElementById("adminPw").value;
  const msg = document.getElementById("modalMsg");
  const btn = document.getElementById("syncPdfBtn");

  if (!pw) { msg.textContent = "비밀번호를 입력해주세요."; msg.className = "modal-msg err"; return; }

  btn.disabled = true;
  msg.textContent = "Drive 스캔 중…";
  msg.className = "modal-msg";

  fetch(SCRIPT_URL + "?action=syncPdfUrls&pw=" + encodeURIComponent(pw))
    .then(response => response.json())
    .then(result => {
      btn.disabled = false;
      msg.textContent = result.message;
      msg.className = "modal-msg " + (result.success ? "ok" : "err");
    })
    .catch(err => {
      btn.disabled = false;
      msg.textContent = "오류: " + err.message;
      msg.className = "modal-msg err";
    });
}

// 모달 외부 클릭 시 닫기
document.getElementById("adminModal").addEventListener("click", function(e) {
  if (e.target === this) closeAdminModal();
});

initData();
</script>
