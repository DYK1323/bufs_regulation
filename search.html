<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>규정 검색 — 부산외국어대학교 규정관리시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<link rel="stylesheet" href="krds_tokens.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy:      var(--krds-color-light-secondary-70);  /* #063A74 */
    --navy-l:    var(--krds-color-light-secondary-60);  /* #1C589C */
    --gold:      #FDB71A;
    --gold-h:    #E59A00;
    --ink:       var(--krds-color-light-gray-90);       /* #1E2124 */
    --ink-soft:  var(--krds-color-light-gray-60);       /* #58616A */
    --ink-muted: var(--krds-color-light-gray-50);       /* #6D7882 */
    --paper:     var(--krds-color-light-gray-0);
    --muted:     var(--krds-color-light-gray-5);
    --card:      var(--krds-color-light-gray-0);
    --mark-bg:   #fffbf0;
    --border:    var(--krds-color-light-gray-20);       /* #CDD1D5 */
    --success:   var(--krds-color-light-success-50);
    --danger:    var(--krds-color-light-danger-50);
  }
  html, body {
    min-height: 100%;
    background: var(--paper);
    color: var(--ink);
    font-family: "Pretendard Variable", "Noto Sans KR", -apple-system, sans-serif;
    font-size: 16px;
    line-height: 1.6;
  }

  /* ── 헤더 ── */
  .site-header {
    position: sticky; top: 0; z-index: 50;
    background: #fff; border-bottom: 1px solid var(--navy);
    padding: 0 32px;
  }
  .site-header-inner {
    max-width: 1280px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    gap: 24px; height: 64px;
  }
  .site-logo {
    display: flex; align-items: center; gap: 12px;
    font-size: 1rem; font-weight: 700; color: #404040;
    text-decoration: none; white-space: nowrap; flex-shrink: 0;
  }
  .site-logo img { height: 1.5em; width: auto; }

  .site-nav {
    display: flex; gap: 4px; align-items: center;
  }
  .site-nav a {
    font-size: 0.9rem; font-weight: 700;
    color: var(--krds-light-color-text-subtle);
    text-decoration: none; white-space: nowrap;
    padding: 6px 12px; border-radius: 6px;
    transition: background 0.15s, color 0.15s;
  }
  .site-nav a:hover {
    color: var(--krds-light-color-text-secondary);
    background: var(--krds-light-color-action-secondary-hover);
  }
  .site-nav a.active {
    color: var(--krds-light-color-text-secondary);
    background: var(--krds-light-color-action-secondary-selected);
    font-weight: 700;
  }

  .header-search-form {
    position: relative; width: 240px; flex-shrink: 0;
  }
  .header-search-icon {
    position: absolute; left: 0; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; color: #9ca3af; pointer-events: none;
  }
  .header-search-input {
    width: 100%; border: none;
    border-bottom: 1px solid var(--krds-light-color-border-gray-light);
    padding: 6px 4px 6px 22px; font-size: 0.88rem; font-family: inherit;
    background: transparent; color: var(--ink); outline: none;
    transition: border-color 0.15s;
  }
  .header-search-input:focus { border-bottom-color: var(--krds-light-color-border-secondary); }
  .header-search-input::placeholder { color: var(--krds-light-color-text-disabled); }

  /* ── 페이지 본문 ── */
  .page-wrap { max-width: 1280px; margin: 0 auto; padding: 0 32px 80px; }

  /* 초기 로딩 오버레이 */
  .init-overlay {
    position: fixed; inset: 0; background: rgba(255,255,255,0.92);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px;
    z-index: 100; transition: opacity 0.4s; backdrop-filter: blur(4px);
  }
  .init-overlay.hidden { opacity: 0; pointer-events: none; }
  .init-overlay .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border); border-top-color: var(--navy);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  .init-overlay p { font-size: 0.85rem; font-weight: 500; color: var(--ink-muted); }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 검색바 섹션 ── */
  .search-section { padding: 40px 0 0; }
  .search-label { display: none; }
  .search-row {
    display: flex; align-items: center;
    width: 100%; max-width: 560px; margin: 0 auto;
    border: 1px solid var(--krds-light-color-border-gray-dark);
    border-radius: 6px;
    background: #fff; overflow: hidden;
    padding: 4px 4px 4px 16px;
  }
  .search-row:focus-within {
    border-color: var(--krds-light-color-border-secondary);
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
  }
  .search-input {
    flex: 1; border: none; outline: none;
    font-size: 0.95rem; font-family: inherit; background: transparent; color: var(--ink);
    padding: 8px 0;
  }
  .search-input::placeholder { color: var(--krds-light-color-text-disabled); }
  .search-btn {
    border: none;
    background: var(--krds-light-color-button-primary-fill);
    color: var(--krds-light-color-text-inverse-static);
    border-radius: 4px;
    padding: 8px 20px; font-size: 0.95rem; font-weight: 700;
    font-family: inherit; cursor: pointer; transition: background 0.15s; white-space: nowrap;
    flex-shrink: 0;
  }
  .search-btn:hover { background: var(--krds-light-color-button-primary-fill-hover); }
  .search-btn:disabled { background: var(--krds-light-color-button-disabled-fill); color: var(--krds-light-color-text-disabled-on); cursor: not-allowed; }

  .status-bar {
    font-size: 0.85rem; color: var(--ink-muted); font-weight: 500;
    margin: 20px 0 16px; min-height: 18px; text-align: center;
  }

  /* ── 결과 영역 ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .result-table-wrap {
    width: 100%; animation: fadeUp 0.25s ease both;
    background: var(--card); border-radius: 6px; border: 1px solid var(--border); overflow: hidden;
  }
  .result-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  .result-table thead tr { background: var(--muted); }
  .result-table thead th {
    padding: 11px 16px; text-align: left;
    font-weight: 700; font-size: 0.8rem; color: var(--ink); white-space: nowrap;
  }
  .col-reg  { width: 220px; }
  .col-date { width: 140px; }
  .result-table tbody tr { border-top: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
  .result-table tbody tr:hover { background: rgba(0,0,0,0.025); }
  .result-table tbody tr.group-start td { border-top: 1px solid var(--border); }
  .result-table tbody td { padding: 13px 16px; vertical-align: top; line-height: 1.6; color: var(--ink-soft); }
  .cell-reg { font-weight: 600; color: var(--ink) !important; font-size: 0.85rem; }
  .cell-date { color: var(--ink-muted) !important; font-size: 0.82rem; }

  .art-title { font-weight: 600; color: var(--navy); margin-bottom: 4px; font-size: 0.85rem; }
  .art-body  { line-height: 1.7; font-size: 0.88rem; }
  .para-line    { display: block; padding-left: 8px; }
  .item-line    { display: block; padding-left: 24px; text-indent: -1.2em; }
  .subitem-line { display: block; padding-left: 40px; text-indent: -1.2em; }

  .click-hint { font-size: 0.78rem; color: var(--ink-muted); margin-bottom: 12px; font-weight: 500; }

  mark { background: var(--mark-bg); color: inherit; padding: 0 3px; border-radius: 3px; font-weight: 600; }

  .no-result { text-align: center; padding: 60px 0; color: var(--ink-muted); }
  .no-result .icon { font-size: 2rem; display: block; margin-bottom: 12px; opacity: 0.7; }

  /* ── 규정 섹션 헤더 ── */
  .section-head {
    font-size: 1rem; font-weight: 700; color: var(--ink);
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 12px; margin: 8px 0 0;
    border-bottom: 2px solid var(--border);
  }
  .section-head strong {
    font-size: 0.8rem; font-weight: 400; color: var(--ink-muted);
  }

  /* ── 규정 카드 ── */
  .reg-cards { display: flex; flex-direction: column; margin-bottom: 16px; }
  .reg-card {
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    padding: 14px 24px; border-bottom: 1px solid var(--border);
    border-top: 1px solid var(--border); margin-top: -1px;
    cursor: pointer; transition: background 0.1s;
  }
  .reg-card:hover { background: rgba(0,0,0,0.025); }
  .reg-card-left { display: flex; align-items: center; gap: 10px; flex: 1; }
  .reg-card-name { font-size: 0.9rem; color: var(--ink); }
  .reg-card-date { font-size: 0.82rem; color: var(--ink-muted); white-space: nowrap; }
  .reg-card-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .reg-card-pdf {
    display: inline-block; padding: 3px 10px; border: 1px solid var(--border);
    border-radius: 4px; font-size: 0.75rem; font-weight: 600; color: var(--ink-soft);
    text-decoration: none; transition: background 0.15s;
  }
  .reg-card-pdf:hover { background: var(--muted); }

  /* ── 관리자 UI ── */
  .admin-btn {
    position: fixed; bottom: 28px; right: 28px;
    background: var(--krds-light-color-button-tertiary-fill);
    color: var(--krds-light-color-text-basic);
    border: 1px solid var(--krds-light-color-button-tertiary-border);
    border-radius: 6px; padding: 8px 16px; font-size: 0.875rem; font-weight: 600;
    font-family: inherit; cursor: pointer; transition: all 0.15s;
  }
  .admin-btn:hover {
    background: var(--krds-light-color-button-tertiary-fill-hover);
    color: var(--krds-light-color-text-secondary);
    border-color: var(--krds-light-color-border-secondary);
  }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal {
    background: #fff; padding: 32px 36px; width: 340px; border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12); border: 1px solid var(--border);
  }
  .modal h3 { font-size: 1rem; font-weight: 700; margin-bottom: 6px; color: var(--ink); text-align: center; }
  .modal p { font-size: 0.8rem; color: var(--ink-muted); margin-bottom: 20px; line-height: 1.6; text-align: center; }
  .modal input[type="password"] {
    width: 100%; border: 1px solid var(--krds-light-color-border-gray); border-radius: 6px;
    padding: 10px 12px; font-size: 0.88rem; font-family: inherit;
    outline: none; margin-bottom: 12px; transition: border-color 0.15s;
  }
  .modal input[type="password"]:focus { border-color: var(--krds-light-color-border-secondary); }
  .modal-btns { display: flex; gap: 8px; flex-direction: column; }
  .modal-confirm {
    width: 100%;
    background: var(--krds-light-color-button-primary-fill);
    color: var(--krds-light-color-text-inverse-static);
    border-radius: 6px; border: none; padding: 10px;
    font-family: inherit; font-weight: 600; font-size: 0.85rem;
    cursor: pointer; transition: background 0.15s;
  }
  .modal-confirm:hover { background: var(--krds-light-color-button-primary-fill-hover); }
  .modal-confirm:disabled { background: var(--krds-light-color-button-disabled-fill); color: var(--krds-light-color-text-disabled-on); cursor: not-allowed; }
  .modal-cancel {
    width: 100%; background: transparent;
    color: var(--krds-light-color-text-subtle);
    border-radius: 6px;
    border: 1px solid var(--krds-light-color-button-tertiary-border);
    padding: 10px; font-family: inherit; font-weight: 600;
    font-size: 0.85rem; cursor: pointer; transition: background 0.15s;
  }
  .modal-cancel:hover { background: var(--krds-light-color-button-tertiary-fill-hover); color: var(--ink); }
  .modal-msg { font-size: 0.78rem; margin-top: 10px; min-height: 18px; font-weight: 500; text-align: center; }
  .modal-msg.ok  { color: var(--success); }
  .modal-msg.err { color: var(--danger); }

  .site-footer {
    margin-top: 48px; padding-top: 20px; border-top: 1px solid var(--border);
    font-size: 0.75rem; color: var(--ink-muted); text-align: center; font-weight: 400;
  }
  .art-body table { border-collapse: collapse; margin: 10px 0; font-size: 0.85rem; }
  .art-body th, .art-body td { border: 1px solid #d1d5db; padding: 3px 8px; text-align: center; }
  .art-body th { background: #f3f4f6; font-weight: 600; }
</style>
</head>
<body>

<!-- 초기 로딩 오버레이 -->
<div class="init-overlay" id="initOverlay">
  <div class="spinner"></div>
  <p id="initMsg">규정 데이터를 불러오는 중입니다…</p>
</div>

<!-- 헤더 -->
<header class="site-header">
  <div class="site-header-inner">
    <a href="./" class="site-logo">
      <img src="https://www.bufs.ac.kr/data/logo/top_logo_w.png" alt="부산외국어대학교 로고">
      부산외국어대학교 규정관리시스템
    </a>
    <nav class="site-nav">
      <a href="category.html?cat=1">법인</a>
      <a href="category.html?cat=2">학칙</a>
      <a href="category.html?cat=3">위원회</a>
      <a href="category.html?cat=4">학사규정</a>
      <a href="category.html?cat=5">부속기관</a>
      <a href="category.html?cat=6">기타</a>
    </nav>
    <form class="header-search-form" onsubmit="event.preventDefault(); doSearchFromInput(document.getElementById('kwHeader').value);">
      <svg class="header-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="kwHeader" class="header-search-input" type="text" placeholder="규정 검색..." autocomplete="off" disabled>
    </form>
  </div>
</header>

<div class="page-wrap">
  <!-- 검색바 -->
  <div class="search-section">
    <label class="search-label" for="kw">키워드 입력</label>
    <form class="search-row" onsubmit="event.preventDefault(); doSearchFromInput(document.getElementById('kw').value);">
      <input id="kw" class="search-input" type="text"
             placeholder="규정명, 키워드로 검색하세요..."
             autocomplete="off" disabled
             oninput="document.getElementById('kwHeader').value=this.value">
      <button class="search-btn" id="searchBtn" type="submit" disabled>검색</button>
    </form>
  </div>

  <div class="status-bar" id="statusBar"></div>
  <div id="results"></div>

  <footer class="site-footer">
    규정 본문 기준 전문 검색 &nbsp;·&nbsp; record_status = active 행만 포함
  </footer>
</div>

<!-- 관리자 버튼 -->
<button class="admin-btn" onclick="openAdminModal()">⚙ 관리자</button>

<!-- 관리자 모달 -->
<div class="modal-overlay" id="adminModal">
  <div class="modal">
    <h3>관리자</h3>
    <p>스프레드시트 수정 후 캐시를 초기화하면<br>최신 데이터가 반영됩니다.</p>
    <input type="password" id="adminPw" placeholder="관리자 비밀번호"
           onkeydown="if(event.key==='Enter') confirmClear()">
    <div class="modal-btns">
      <button class="modal-confirm" id="confirmBtn" onclick="confirmClear()">캐시 초기화</button>
      <button class="modal-confirm" id="syncPdfBtn" onclick="confirmSyncPdf()" style="background:#375623">PDF 링크 매핑</button>
      <button class="modal-cancel" onclick="closeAdminModal()">취소</button>
    </div>
    <div class="modal-msg" id="modalMsg"></div>
  </div>
</div>

<script>
let ALL_ROWS         = [];
let ALL_AMENDMENTS   = [];
const SCRIPT_URL     = "https://script.google.com/macros/s/AKfycbx5Sqkb3yN1yPqmjSLv_9JIFUuyEvEqVA0Lw6s4OlLwUwtmRj1zMz7NXAautTuzngbg/exec";
let REG_META_MAP     = {};
let REG_LIST         = [];

// ── 유틸 ─────────────────────────────────────────────────────
function buildArticleNo(raw) {
  if (!raw) return "";
  const s = String(raw).trim();
  if (s.includes("_")) { const p = s.split("_"); return "제" + p[0] + "조의" + p[1]; }
  return "제" + s + "조";
}
const CIRCLED = ["","①","②","③","④","⑤","⑥","⑦","⑧","⑨","⑩",
                 "⑪","⑫","⑬","⑭","⑮","⑯","⑰","⑱","⑲","⑳"];
function circle(n) { return CIRCLED[parseInt(n)] || String(n); }
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function highlight(text, kw) {
  if (!kw) return escHtml(text);
  const esc = kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return escHtml(text).replace(new RegExp(esc,"gi"), m => "<mark>" + m + "</mark>");
}
function highlightHtml(text, kw) {
  if (!kw) return text;
  const esc = kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return text.replace(new RegExp(esc,"gi"), m => "<mark>" + m + "</mark>");
}
function amendLabel(name) {
  const m = REG_META_MAP[name] || {};
  if (!m.lastAmendDate) return "";
  return (m.lastAmendType ? m.lastAmendType + " " : "") + m.lastAmendDate;
}

// ── 초기 데이터 로드 ─────────────────────────────────────────
function applyData(rows, amendments, regMeta, regList) {
  ALL_ROWS       = rows       || [];
  ALL_AMENDMENTS = amendments || [];
  REG_META_MAP   = regMeta    || {};
  REG_LIST       = regList    || [];
  document.getElementById("kw").disabled = false;
  document.getElementById("searchBtn").disabled = false;
  document.getElementById("kwHeader").disabled = false;
  document.getElementById("initOverlay").classList.add("hidden");
  const q = decodeURIComponent(new URLSearchParams(location.search).get("q") || "").trim();
  if (q) {
    document.getElementById("kw").value = q;
    document.getElementById("kwHeader").value = q;
    doSearch(q);
  } else {
    document.getElementById("kw").focus();
  }
}

function initData() {
  // sessionStorage에 캐시된 데이터가 있으면 API 호출 없이 즉시 사용
  try {
    const cached = sessionStorage.getItem("searchData");
    if (cached) {
      const d = JSON.parse(cached);
      const regList = JSON.parse(localStorage.getItem("regList") || "[]");
      applyData(d.rows, d.amendments, d.regMeta, regList);
      return;
    }
  } catch(e) {}

  fetch(SCRIPT_URL + "?action=data")
    .then(response => response.json())
    .then(data => {
      try { localStorage.setItem("regList", JSON.stringify(data.regList || [])); } catch(e) {}
      try {
        sessionStorage.setItem("searchData", JSON.stringify({
          rows: data.rows || [], amendments: data.amendments || [], regMeta: data.regMeta || {}
        }));
      } catch(e) {}
      applyData(data.rows, data.amendments, data.regMeta, data.regList);
    })
    .catch(err => {
      const overlay = document.getElementById("initOverlay");
      overlay.querySelector(".spinner").style.display = "none";
      const msg = document.getElementById("initMsg");
      msg.innerHTML = "데이터 로드 실패: " + escHtml(err.message)
        + '<br><button onclick="location.reload()" style="margin-top:12px;padding:6px 16px;border:1px solid #1B3A5C;border-radius:6px;background:#1B3A5C;color:#fff;cursor:pointer;font-size:0.82rem;">새로고침</button>';
    });
}

// ── 검색 진입점 ──────────────────────────────────────────────
function doSearchFromInput(kw) {
  kw = (kw || "").trim();
  if (!kw) return;
  document.getElementById("kw").value = kw;
  document.getElementById("kwHeader").value = kw;
  history.replaceState(null, "", "search.html?q=" + encodeURIComponent(kw));
  doSearch(kw);
}

// ── 브라우저 내 검색 ─────────────────────────────────────────
function doSearch(kw) {
  if (!kw) return;
  const kwLower = kw.toLowerCase();

  // ── 규정명 검색 ──────────────────────────────────────────
  const regNames   = [...new Set(ALL_ROWS.map(r => r.regulationName))];
  const regMatches = regNames
    .filter(name => name.toLowerCase().includes(kwLower))
    .map(name => ({
      regulationName : name,
      lastAmendLabel : amendLabel(name)
    }));

  // ── 조문 내용 검색 ────────────────────────────────────────
  const seen           = new Set();
  const articleMatches = [];

  ALL_ROWS.forEach(r => {
    if (!r.content.toLowerCase().includes(kwLower)) return;
    const key = r.regulationName + "||" + r.articleNo;
    if (seen.has(key)) return;
    seen.add(key);

    const articleRows = ALL_ROWS.filter(x =>
      x.regulationName === r.regulationName &&
      x.articleNo      === r.articleNo
    ).sort((a, b) => a.sortKey.localeCompare(b.sortKey));

    articleMatches.push({
      regulationName : r.regulationName,
      lastAmendLabel : amendLabel(r.regulationName),
      effDate        : (function(m){ return m.lastEffDate || m.lastAmendDate || ""; })(REG_META_MAP[r.regulationName] || {}),
      articleNo      : r.articleNo,
      articleTitle   : r.articleTitle,
      articleRows    : articleRows,
    });
  });

  articleMatches.sort((a, b) => {
    const nc = a.regulationName.localeCompare(b.regulationName, "ko");
    if (nc !== 0) return nc;
    return a.articleNo.localeCompare(b.articleNo);
  });

  // ── 상태바 ────────────────────────────────────────────────
  const parts = [];
  if (regMatches.length)     parts.push("규정 " + regMatches.length + "건");
  if (articleMatches.length) parts.push("조문 " + articleMatches.length + "건");
  document.getElementById("statusBar").textContent =
    parts.length > 0
      ? '"' + kw + '" 검색 결과 — ' + parts.join(", ")
      : '';

  renderResults(regMatches, articleMatches, kw);
}

function renderArticleBody(articleRows, kw) {
  const paraCount = articleRows.filter(r => r.paragraphNo && !r.itemNo).length;
  let html = "";
  articleRows.forEach(r => {
    if (r.subitemNo) {
      html += '<span class="subitem-line">' + escHtml(String(r.subitemNo).replace(/\.+$/, "")) + ".&nbsp;" + highlightHtml(r.content, kw) + '</span>';
    } else if (r.itemNo) {
      html += '<span class="item-line">' + escHtml(String(r.itemNo).replace(/\.+$/, "")) + ".&nbsp;" + highlightHtml(r.content, kw) + '</span>';
    } else if (r.paragraphNo) {
      html += '<span class="para-line">'
            + (paraCount > 1 ? circle(r.paragraphNo) + "&nbsp;" : "")
            + highlightHtml(r.content, kw) + '</span>';
    }
  });
  return html;
}

function renderResults(regMatches, articleMatches, kw) {
  const el = document.getElementById("results");

  if (!regMatches.length && !articleMatches.length) {
    el.innerHTML =
      '<div class="no-result"><span class="icon">🔍</span>'
      + '<p><strong>"' + escHtml(kw) + '"</strong>에 해당하는 규정 또는 조문이 없습니다.</p></div>';
    return;
  }

  let html = "";

  const iconSvg = '<svg style="width:15px;height:15px;flex-shrink:0;color:#9ca3af" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>';

  // ── 규정 섹션 ────────────────────────────────────────────
  if (regMatches.length) {
    html += '<div class="section-head">규정 <strong>' + regMatches.length + '건</strong></div>';
    html += '<div class="reg-cards">';
    regMatches.forEach(item => {
      const regEsc = item.regulationName.replace(/\\/g,"\\\\").replace(/'/g,"\\'");
      const meta   = REG_META_MAP[item.regulationName] || {};
      const pdfUrl = meta.pdfUrl || "";
      html +=
        '<div class="reg-card" onclick="openFullPage(\'' + regEsc + '\')" title="전문 보기">'
        + '<div class="reg-card-left">' + iconSvg
        + '<span class="reg-card-name">' + highlight(item.regulationName, kw) + '</span></div>'
        + '<div class="reg-card-right">'
        + (item.lastAmendLabel ? '<span class="reg-card-date">' + escHtml(item.lastAmendLabel) + '</span>' : '')
        + (pdfUrl ? '<a class="reg-card-pdf" href="' + escHtml(pdfUrl) + '" target="_blank" onclick="event.stopPropagation()">PDF ↗</a>' : '')
        + '</div>'
        + '</div>';
    });
    html += '</div>';
  }

  // ── 조문 섹션 ────────────────────────────────────────────
  if (articleMatches.length) {
    html += '<div class="section-head"' + (regMatches.length ? ' style="margin-top:32px"' : '') + '>'
          + '조문 <strong>' + articleMatches.length + '건</strong></div>';
    html += '<p class="click-hint">행을 클릭하면 해당 규정 전문이 열립니다</p>';

    let rows    = "";
    let prevReg = null;

    articleMatches.forEach(item => {
      const isGroupStart = item.regulationName !== prevReg;
      prevReg = item.regulationName;
      const artNo    = buildArticleNo(item.articleNo);
      const artTitle = item.articleTitle ? artNo + "(" + item.articleTitle + ")" : artNo;
      const body     = renderArticleBody(item.articleRows, kw);
      const regEsc   = item.regulationName.replace(/\\/g,"\\\\").replace(/'/g,"\\'");

      rows +=
        '<tr' + (isGroupStart ? ' class="group-start"' : '')
        + ' onclick="openFullPage(\'' + regEsc + '\')" title="클릭하면 전문 보기">'
        + '<td class="cell-reg">' + (isGroupStart ? escHtml(item.regulationName) : "") + '</td>'
        + '<td class="cell-date">' + (isGroupStart ? escHtml(item.effDate) : "") + '</td>'
        + '<td class="cell-cont">'
        + '<div class="art-title">' + escHtml(artTitle) + '</div>'
        + '<div class="art-body">' + body + '</div>'
        + '</td></tr>';
    });

    html += '<div class="result-table-wrap"><table class="result-table">'
          + '<thead><tr>'
          + '<th class="col-reg">규정명</th>'
          + '<th class="col-date">시행일</th>'
          + '<th class="col-cont">내용</th>'
          + '</tr></thead><tbody>' + rows + '</tbody></table></div>';
  }

  el.innerHTML = html;
}

function openFullPage(regulationName) {
  localStorage.setItem("targetRegulation", regulationName);
  const regRows = ALL_ROWS.filter(r => r.regulationName === regulationName);
  const amends  = ALL_AMENDMENTS
    .filter(a => a.regulationName === regulationName)
    .sort((a, b) => a.seq - b.seq);
  const meta    = REG_META_MAP[regulationName] || {};

  localStorage.setItem("fullRegData", JSON.stringify({
    regulationName,
    rows: regRows,
    amendments: amends,
    pdfUrl: meta.pdfUrl || "",
    meta
  }));

  location.href = "full.html";
}

// ── 관리자 모달 ──────────────────────────────────────────────
function openAdminModal() {
  document.getElementById("adminPw").value = "";
  document.getElementById("modalMsg").textContent = "";
  document.getElementById("modalMsg").className = "modal-msg";
  document.getElementById("confirmBtn").disabled = false;
  document.getElementById("adminModal").classList.add("show");
  setTimeout(() => document.getElementById("adminPw").focus(), 100);
}

function closeAdminModal() {
  document.getElementById("adminModal").classList.remove("show");
}

function confirmClear() {
  const pw  = document.getElementById("adminPw").value;
  const btn = document.getElementById("confirmBtn");
  const msg = document.getElementById("modalMsg");

  if (!pw) { msg.textContent = "비밀번호를 입력해주세요."; msg.className = "modal-msg err"; return; }

  btn.disabled = true;
  msg.textContent = "초기화 중…";
  msg.className = "modal-msg";

  fetch(SCRIPT_URL + "?action=clearCache&pw=" + encodeURIComponent(pw))
    .then(response => response.json())
    .then(result => {
      btn.disabled = false;
      msg.textContent = result.message;
      msg.className = "modal-msg " + (result.success ? "ok" : "err");

      if (result.success) {
        setTimeout(function() {
          closeAdminModal();
          document.getElementById("initOverlay").classList.remove("hidden");
          document.getElementById("initMsg").textContent = "최신 데이터를 불러오는 중입니다…";
          document.getElementById("kw").disabled = true;
          document.getElementById("searchBtn").disabled = true;
          document.getElementById("kwHeader").disabled = true;
          ALL_ROWS = []; ALL_AMENDMENTS = []; REG_META_MAP = {};
          try { sessionStorage.removeItem("searchData"); } catch(e) {}
          initData();
        }, 1200);
      }
    })
    .catch(err => {
      btn.disabled = false;
      msg.textContent = "오류: " + err.message;
      msg.className = "modal-msg err";
    });
}

function confirmSyncPdf() {
  const pw  = document.getElementById("adminPw").value;
  const msg = document.getElementById("modalMsg");
  const btn = document.getElementById("syncPdfBtn");

  if (!pw) { msg.textContent = "비밀번호를 입력해주세요."; msg.className = "modal-msg err"; return; }

  btn.disabled = true;
  msg.textContent = "Drive 스캔 중…";
  msg.className = "modal-msg";

  fetch(SCRIPT_URL + "?action=syncPdfUrls&pw=" + encodeURIComponent(pw))
    .then(response => response.json())
    .then(result => {
      btn.disabled = false;
      msg.textContent = result.message;
      msg.className = "modal-msg " + (result.success ? "ok" : "err");
    })
    .catch(err => {
      btn.disabled = false;
      msg.textContent = "오류: " + err.message;
      msg.className = "modal-msg err";
    });
}

// 모달 외부 클릭 시 닫기
document.getElementById("adminModal").addEventListener("click", function(e) {
  if (e.target === this) closeAdminModal();
});

initData();
</script>
